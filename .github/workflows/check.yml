name: epey-fiyat
on:
  schedule:
    - cron: "*/30 * * * *"   # 30 dakikada bir (GitHub bazen birkaç dk geciktirir)
  workflow_dispatch:
    inputs:
      dump:
        description: "1 = tam listeyi Telegram'a gonder"
        default: "1"
permissions:
  contents: write
concurrency:
  group: epey-fiyat
  cancel-in-progress: false
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
          sudo apt-get install -y xvfb
      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DUMP: ${{ github.event.inputs.dump }}
        run: xvfb-run -a python scraper.py
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add epey-state.json
          git commit -m "state $(date -u +%FT%TZ)" || echo "degisiklik yok"
          git push
