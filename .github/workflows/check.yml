name: epey-bekci
# Asil motor ev PC'si (pc_sweep.py, 5 dk'da bir, duz HTTP - ev IP'sinde CF yok).
# Bu workflow sadece BEKCI + YEDEK:
#  - heartbeat.txt 40 dk'dan eskiyse: Telegram'a bir kez "PC sustu" uyarisi
#    (pc-down.flag ile dedup) ve Playwright ile tek yedek tarama denenir
#    (Actions IP'lerini CF cogu zaman blokluyor; gecerse veri akmaya devam eder).
#  - Kalp atisi tazeyse hicbir sey yapmadan yesil biter; flag varsa "PC geri
#    geldi" mesaji atilip flag silinir.
# Eski kendini zincirleyen 5,5 saatlik dongu KALDIRILDI (CF, Actions IP'lerini
# ~24 saat kesintisiz blokladi; zincir motor olamayacagini kanitladi).
# Cron gecikmeli calisabilir (GitHub bu reponun cron'larini atliyor) - bekci
# icin sorun degil, zamanlama PC'de.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      dump:
        description: "1 = Actions'tan Playwright ile tam liste gonder (test)"
        default: "0"
permissions:
  contents: write
concurrency:
  group: epey-bekci
  cancel-in-progress: false
jobs:
  bekci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Kalp atisi kontrolu
        id: hb
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tg() { curl -s -m 30 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" -d chat_id="${TG_CHAT}" --data-urlencode text="$1" >/dev/null || true; }
          sync() { git add -A; git commit -m "$1" || true; git pull --rebase -X theirs || git rebase --abort || true; git push || true; }
          hb=$(cat heartbeat.txt 2>/dev/null || echo 1970-01-01T00:00:00Z)
          age=$(( ($(date +%s) - $(date -d "$hb" +%s)) / 60 ))
          echo "kalp atisi $age dk once"
          if [ "${{ inputs.dump }}" = "1" ]; then
            echo "fallback=true" >> "$GITHUB_OUTPUT"   # elle tam liste istegi
          elif [ "$age" -lt 40 ]; then
            if [ -f pc-down.flag ]; then
              rm pc-down.flag
              tg "PC geri geldi - takip yine PC'de ($age dk once kalp atisi)"
              sync "pc geri geldi"
            fi
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          else
            if [ ! -f pc-down.flag ]; then
              touch pc-down.flag
              tg "PC'den $age dk'dir kalp atisi yok (kapali/uykuda?) - Actions yedege geciyor, CF izin verirse veri devam eder"
              sync "pc sustu"
            fi
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install (yedek tarama icin)
        if: steps.hb.outputs.fallback == 'true'
        continue-on-error: true
        run: |
          for i in 1 2 3; do  # ponytail: apt/depo ariza sinifi (07-07'de zinciri kopardi) icin retry
            pip install playwright \
              && python -m playwright install --with-deps chromium \
              && sudo apt-get install -y xvfb && exit 0
            echo "install deneme $i basarisiz"; sleep 60
          done
          exit 1
      - name: Yedek tarama (tek gecis, Playwright)
        if: steps.hb.outputs.fallback == 'true'
        continue-on-error: true  # CF bloklarsa scraper flag+mesajla susturur; job yesil kalir, mail firtinasi olmaz
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DUMP: ${{ inputs.dump }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          xvfb-run -a python scraper.py || true
          # heartbeat.txt'ye DOKUNMA: o sadece PC'nin canlilik sinyali
          git add -A
          git commit -m "yedek tarama $(date -u +%FT%TZ)" || true
          git pull --rebase -X theirs || git rebase --abort || true
          git push || true
