name: epey-fiyat
on:
  schedule:
    # ponytail: cron artik zamanlayici degil, yeniden-baslatici: dongu job'u ~5.5
    # saatte bir biter/olur, kuyrukta bekleyen cron run'i taze IP ile devralir.
    # Offset dakikalar cunku GitHub :00/:30 event'lerini sik atliyor.
    - cron: "6,21,36,51 * * * *"
  workflow_dispatch:
    inputs:
      dump:
        description: "1 = tam listeyi Telegram'a gonder (tek seferlik, dongusuz)"
        default: "1"
permissions:
  contents: write
concurrency:
  # dispatch ayri grupta: dump istegi 5.5 saatlik dongunun arkasinda beklemesin
  group: epey-fiyat-${{ github.event_name }}
  cancel-in-progress: false
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
          sudo apt-get install -y xvfb
      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DUMP: ${{ github.event.inputs.dump }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # ponytail: araliksiz kontrol = job limiti dolana kadar dongu.
          # Scraper CF'ye takilirsa (exit 1) job burada olur - bilerek: yeni job = yeni IP.
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then end=$((SECONDS + 330*60)); else end=$SECONDS; fi
          while :; do
            xvfb-run -a python scraper.py
            git add epey-state.json
            git commit -m "state $(date -u +%FT%TZ)" || true
            git pull --rebase || git rebase --abort || true
            git push || true
            [ $SECONDS -lt $end ] || break
            sleep 120  # ponytail: ayni IP'den CF'yi isitmamak icin nefes payi; 0 yapma
          done
