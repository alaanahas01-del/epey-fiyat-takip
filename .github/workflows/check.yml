name: epey-bekci
# Asil motor ev PC'si (pc_sweep.py, 5 dk'da bir, duz HTTP - ev IP'sinde CF yok).
# Bu workflow sadece YEDEK: heartbeat.txt 40 dk'dan eskiyse (PC kapali/uykuda)
# Playwright ile tek yedek tarama denenir (Actions IP'lerini CF cogu zaman
# blokluyor; gecerse fiyat bildirimleri kesintisiz surer).
# Kullanici istegi (2026-07-08): Telegram'a SADECE fiyat bildirimi gider;
# "PC sustu/geri geldi" gibi operasyonel mesaj YOK. PC'nin durumu merak
# edilirse iz: repo commit gecmisi (pc/yedek tarama) ve Actions loglari.
# Eski kendini zincirleyen 5,5 saatlik dongu KALDIRILDI (CF, Actions IP'lerini
# ~24 saat kesintisiz blokladi; zincir motor olamayacagini kanitladi).
# Cron gecikmeli calisabilir (GitHub bu reponun cron'larini atliyor) - yedek
# icin sorun degil, zamanlama PC'de.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      dump:
        description: "1 = Actions'tan Playwright ile tam liste gonder (test)"
        default: "0"
permissions:
  contents: write
concurrency:
  group: epey-bekci
  cancel-in-progress: false
jobs:
  bekci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Kalp atisi kontrolu
        id: hb
        run: |
          hb=$(cat heartbeat.txt 2>/dev/null || echo 1970-01-01T00:00:00Z)
          age=$(( ($(date +%s) - $(date -d "$hb" +%s)) / 60 ))
          echo "kalp atisi $age dk once"
          if [ "${{ inputs.dump }}" = "1" ] || [ "$age" -ge 40 ]; then
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install (yedek tarama icin)
        if: steps.hb.outputs.fallback == 'true'
        continue-on-error: true
        run: |
          for i in 1 2 3; do  # ponytail: apt/depo ariza sinifi (07-07'de zinciri kopardi) icin retry
            pip install playwright \
              && python -m playwright install --with-deps chromium \
              && sudo apt-get install -y xvfb && exit 0
            echo "install deneme $i basarisiz"; sleep 60
          done
          exit 1
      - name: Yedek tarama (tek gecis, Playwright)
        if: steps.hb.outputs.fallback == 'true'
        continue-on-error: true  # CF bloklarsa sessizce biter; job yesil kalir, mail firtinasi olmaz
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DUMP: ${{ inputs.dump }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          xvfb-run -a python scraper.py || true
          # heartbeat.txt'ye DOKUNMA: o sadece PC'nin canlilik sinyali
          git add -A
          git commit -m "yedek tarama $(date -u +%FT%TZ)" || true
          git pull --rebase -X theirs || git rebase --abort || true
          git push || true
