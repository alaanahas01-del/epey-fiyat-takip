name: epey-fiyat
on:
  schedule:
    # ponytail: asil mekanizma kendini zincirleyen workflow_dispatch; cron sadece
    # zincir koparsa (CF blogu, job crash) yeniden baslatan yedek. GitHub bu repo
    # icin cron event'lerinin cogunu atiyor (gozlenen: 4+ ardisik atlama, 1.5-4.5
    # saatlik bosluklar), o yuzden zamanlama cron'a EMANET EDILMEZ.
    - cron: "6,21,36,51 * * * *"
  workflow_dispatch:
    inputs:
      dump:
        description: "1 = tam listeyi gonder (tek gecis); 0 = araliksiz dongu baslat (BOS BIRAKMA: bos input'a GitHub default'u uygular)"
        default: "1"
permissions:
  contents: write
  actions: write
concurrency:
  # dump tek gecisi donguyu beklemesin diye ayri grup; tum dongu turleri
  # (cron / zincir / manuel) tek grupta -> ayni anda en fazla 1 dongu.
  group: epey-fiyat-${{ github.event.inputs.dump == '1' && 'dump' || 'loop' }}
  cancel-in-progress: false
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
          sudo apt-get install -y xvfb
      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DUMP: ${{ github.event.inputs.dump }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # ponytail: araliksiz kontrol = job limitine kadar dongu; dump=1 tek gecis.
          # Scraper olurse (CF blogu vb.) job KIRMIZIYA DUSMEZ: flag commit'lenir,
          # 10 dk beklenir, zincir adimi yine calisir -> taze runner IP'siyle retry.
          # Bedeli: kalici bir bug'da sessiz yesil dongu olabilir; Telegram'dan
          # fiyat kesilirse loglara bak. Cron sadece derin yedek (runner/dispatch coksse).
          if [ "$DUMP" = "1" ]; then end=$SECONDS; else end=$((SECONDS + 330*60)); fi
          while :; do
            if ! xvfb-run -a python scraper.py; then
              git add -A
              git commit -m "cf blocked $(date -u +%FT%TZ)" || true
              git pull --rebase || git rebase --abort || true
              git push || true
              [ "$DUMP" = "1" ] || sleep 600  # ayni IP zaten yanik; bekle, zincir taze IP alsin
              break
            fi
            git add -A
            git commit -m "state $(date -u +%FT%TZ)" || true
            git pull --rebase || git rebase --abort || true
            git push || true
            [ $SECONDS -lt $end ] || break
            sleep 120  # ponytail: ayni IP'den CF'yi isitmamak icin nefes payi; 0 yapma
          done
      - name: Zinciri surdur (sonraki dongu job'unu tetikle)
        if: success() && github.event.inputs.dump != '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run check.yml -R ${{ github.repository }} -f dump=0
